name: CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 pytest pytest-cov bandit

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Security check with bandit
      run: |
        bandit -r . -ll

    - name: Run Tests with pytest
      env:
        TELEGRAM_BOT_TOKEN: "123:test_token"
        ADMIN_IDS: "123456"
      run: |
        pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/telegram-bot
            git pull origin main

            # Генерируем .env файл из секретов GitHub (безопасная передача токенов)
            echo "TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "ADMIN_IDS=${{ secrets.ADMIN_IDS }}" >> .env

            docker build -t telegram-bot .
            docker stop bot-container || true
            docker rm bot-container || true

            # Запускаем с монтированием папки data для сохранения БД и логов
            # Убедитесь, что ваш бот сохраняет БД в папку /app/data
            docker run -d --name bot-container --restart always --env-file .env -v $(pwd)/data:/app/data telegram-bot

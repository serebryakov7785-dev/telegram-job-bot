name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      env:
        # Задаем фиктивные переменные окружения для тестов
        TELEGRAM_BOT_TOKEN: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
        ADMIN_IDS: "123456789"
      run: |
        pytest -v --cov=. --cov-report=term-missing

    - name: Run Mutation Testing (mutmut)
      env:
        TELEGRAM_BOT_TOKEN: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
        ADMIN_IDS: "123456789"
      run: |
        pip install mutmut
        # Запускаем mutmut. || true предотвращает падение пайплайна, если найдутся выжившие мутанты
        mutmut run || true
        mutmut results

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Запускаем деплой только при пуше в ветки main/master (не при Pull Request)
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    
    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Переходим в папку проекта на сервере (замените путь на ваш)
          cd /opt/telegram-bot
          
          # Обновляем код из репозитория
          git pull
          
          # Пересобираем и перезапускаем бота через Docker Compose
          docker-compose up -d --build